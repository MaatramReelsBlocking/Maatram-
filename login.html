<script>
/* ══ MAATRAM Performance Mode — shared across all pages ══
   Sets window.MAATRAM_PERF (true = performance/low-lag mode) BEFORE any
   page canvas code runs, so each page's LITE flag can honor it.
   Default: ON for weak/old devices, user can override and it persists. */
(function(){
  var KEY='maatram_perf';
  var weak = matchMedia('(pointer:coarse)').matches
          || innerWidth<820
          || (navigator.hardwareConcurrency||8)<=4
          || (navigator.deviceMemory||8)<=4;
  var saved=null; try{saved=localStorage.getItem(KEY);}catch(_){}
  var on = saved===null ? weak : saved==='1';
  window.MAATRAM_PERF = on;
  try{ if(saved===null) localStorage.setItem(KEY, on?'1':'0'); }catch(_){}
  document.documentElement.classList.toggle('perf', on);
})();
</script>

<script>
/* ══ Firebase config (Maatram) ══ */
const FB_CONFIG = {
  apiKey: "AIzaSyAjiAm61IkH3wB1tjwOyGRrXAuRMKQyCcQ",
  authDomain: "maatram-859f4.firebaseapp.com",
  projectId: "maatram-859f4",
  storageBucket: "maatram-859f4.firebasestorage.app",
  messagingSenderId: "770970784123",
  appId: "1:770970784123:web:7c73c74ddb2179b69dedde"
};

const $=id=>document.getElementById(id);
const st=$('status');
const HOSTED = location.protocol==='http:'||location.protocol==='https:';

async function boot(){
  if(!HOSTED){
    st.className='err';
    st.innerHTML='Google sign-in needs a real web address.<br>This page must run on your Vercel URL (or a local server) — not opened straight from a file.';
    $('gbtn').disabled=true;
    return;
  }
  const [{initializeApp},
         {getAuth,GoogleAuthProvider,signInWithPopup,onAuthStateChanged,signOut},
         {getFirestore,doc,getDoc,setDoc,serverTimestamp}] = await Promise.all([
    import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js').then(m=>({initializeApp:c=>m.getApps().length?m.getApp():m.initializeApp(c)})),
    import('https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js'),
    import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js')
  ]);
  const app=initializeApp(FB_CONFIG), auth=getAuth(app), db=getFirestore(app);

  onAuthStateChanged(auth, async user=>{
    if(user){
      try{
        const ref=doc(db,'users',user.uid);
        const snap=await getDoc(ref);
        await setDoc(ref,{
          name:user.displayName||'Student',
          photo:user.photoURL||'',
          points:snap.exists()?(snap.data().points||0):0,
          lastLogin:serverTimestamp()
        },{merge:true});
      }catch(e){ console.warn('profile write',e); }
      $('meImg').src=user.photoURL||'';
      $('meName').textContent=user.displayName||'Student';
      $('meMail').textContent=user.email||'';
      $('signin').style.display='none';
      $('me').style.display='block';
    }else{
      $('signin').style.display='block';
      $('me').style.display='none';
    }
  });

  $('gbtn').onclick=async()=>{
    $('gbtn').disabled=true; st.className=''; st.textContent='Opening Google sign-in…';
    try{
      await signInWithPopup(auth,new GoogleAuthProvider());
      st.className='ok'; st.textContent='Signed in ✓';
    }catch(e){
      st.className='err';
      st.textContent = e.code==='auth/popup-closed-by-user' ? 'Popup closed — try again.'
        : e.code==='auth/unauthorized-domain' ? 'Sign-in is temporarily unavailable — please try again in a bit.'
        : 'Sign-in failed: '+(e.code||e.message);
      if(e.code==='auth/unauthorized-domain')console.warn('[Maatram dev] Add this domain in Firebase → Authentication → Settings → Authorized domains:',location.hostname);
    }
    $('gbtn').disabled=false;
  };
  $('signOut').onclick=()=>signOut(auth);
}
boot();

/* ══ background ══ */
const cv=$('bg'),ctx=cv.getContext('2d');
const LITE=(window.MAATRAM_PERF!==undefined)?window.MAATRAM_PERF:(matchMedia('(pointer:coarse)').matches||innerWidth<820||(navigator.hardwareConcurrency||8)<=4);
const DPR=LITE?1:Math.min(devicePixelRatio||1,1.5);let W,H;
function fit(){W=Math.max(1,innerWidth);H=Math.max(1,innerHeight);
  cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);}
fit();addEventListener('resize',fit);
const mouse={x:-999,y:-999};
addEventListener('pointermove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;});
const orbs=[{hx:.22,hy:.3,sp:.00007,ph:0,c:'47,227,143'},{hx:.78,hy:.68,sp:.00005,ph:2.4,c:'55,182,255'}];
const COLS=['rgb(47,227,143)','rgb(55,182,255)','rgb(255,209,102)','rgb(255,110,199)'];
const tk=[];for(let i=0;i<(LITE?18:46);i++)tk.push({x:Math.random(),y:Math.random(),tw:Math.random()*7,c:COLS[i%4],s:.7+Math.random()*1.5});
let shots=[],nextShot=performance.now()+2500;
const reduced=(window.MAATRAM_PERF===true) || matchMedia('(prefers-reduced-motion: reduce)').matches;
function loop(t){
  ctx.clearRect(0,0,W,H);
  for(const o of orbs){o.ph+=o.sp*16;
    let cx=(o.hx+Math.sin(o.ph)*.09)*W,cy=(o.hy+Math.cos(o.ph*1.3)*.08)*H;
    if(mouse.x>0){cx+=(mouse.x-cx)*.03;cy+=(mouse.y-cy)*.03;}
    const R=Math.max(W,H)*.32,g=ctx.createRadialGradient(cx,cy,0,cx,cy,R);
    g.addColorStop(0,'rgba('+o.c+',.10)');g.addColorStop(.55,'rgba('+o.c+',.035)');g.addColorStop(1,'rgba('+o.c+',0)');
    ctx.fillStyle=g;ctx.fillRect(cx-R,cy-R,R*2,R*2);}
  for(const d of tk){d.tw+=.035;ctx.globalAlpha=.18+.3*Math.abs(Math.sin(d.tw));
    ctx.fillStyle=d.c;ctx.beginPath();ctx.arc(d.x*W,d.y*H,d.s,0,6.283);ctx.fill();}
  ctx.globalAlpha=1;
  if(t>nextShot){shots.push({x:Math.random()<.5?-30:W*Math.random(),y:-20,vx:5+Math.random()*4,vy:2.4+Math.random()*2,life:1,
    c:Math.random()<.5?'47,227,143':'55,182,255'});nextShot=t+3500+Math.random()*5000;}
  shots=shots.filter(s=>s.life>0&&s.x<W+80&&s.y<H+80);
  for(const s of shots){s.x+=s.vx;s.y+=s.vy;s.life-=.008;
    const g=ctx.createLinearGradient(s.x,s.y,s.x-s.vx*9,s.y-s.vy*9);
    g.addColorStop(0,'rgba('+s.c+','+(s.life*.9)+')');g.addColorStop(1,'rgba('+s.c+',0)');
    ctx.strokeStyle=g;ctx.lineWidth=1.8;ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x-s.vx*9,s.y-s.vy*9);ctx.stroke();}
  if(!reduced)requestAnimationFrame(loop);
}
if(!reduced)requestAnimationFrame(loop);else loop(0);
</script>

<script>
/* ══ universal nav auth (Firebase session shared across all pages) ══ */
(async()=>{
  const chip=document.getElementById('mnavChip'),inBtn=document.getElementById('mnavIn'),
        menu=document.getElementById('mnavMenu');
  if(!chip)return;
  chip.addEventListener('click',e=>{ if(!e.target.closest('#mnavMenu')) menu.classList.toggle('open'); });
  document.addEventListener('click',e=>{ if(!e.target.closest('#mnavChip')) menu.classList.remove('open'); });
  if(!(location.protocol==='http:'||location.protocol==='https:'))return;  // file:// → nav stays simple
  try{
    const [{initializeApp,getApps,getApp},{getAuth,onAuthStateChanged,signOut},{getFirestore,doc,onSnapshot,runTransaction}]=await Promise.all([
      import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js'),
      import('https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js'),
      import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js')
    ]);
    const app=getApps().length?getApp():initializeApp({apiKey:"AIzaSyAjiAm61IkH3wB1tjwOyGRrXAuRMKQyCcQ",authDomain:"maatram-859f4.firebaseapp.com",projectId:"maatram-859f4",storageBucket:"maatram-859f4.firebasestorage.app",messagingSenderId:"770970784123",appId:"1:770970784123:web:7c73c74ddb2179b69dedde"});
    const auth=getAuth(app),db=getFirestore(app);
    let unsub=null;
    /* ══ Maatram points engine (all pages) ══ */
    let __mtUser=null;
    window.maatramAward=async function(pts,reason){
      pts=Math.round(pts); if(!pts) return;
      /* local bank (works offline / signed-out) */
      try{
        const cur=+localStorage.getItem('maatram_points')||0;
        localStorage.setItem('maatram_points',Math.max(0,cur+pts));
      }catch(_){}
      try{ new BroadcastChannel('maatram').postMessage({type:'points',pts}); }catch(_){}
      try{ parent.postMessage({maatramRelay:{type:'points',pts}},'*'); }catch(_){}
      mtToast(pts,reason);
      /* cloud write (clamped to security rules: floor 0, max +200 / −100 per write) */
      if(__mtUser){
        const uid=__mtUser.uid;
        try{
          await runTransaction(db,async t=>{
            const r=doc(db,'users',uid);
            const s=await t.get(r);
            const cur=(s.exists()&&s.data().points)||0;
            let nx=cur+pts;
            nx=Math.max(0,Math.max(cur-100,Math.min(cur+200,nx)));
            t.set(r,{points:nx},{merge:true});
          });
        }catch(e){ console.warn('points write',e); }
      }
    };
    function mtToast(pts,reason){
      const t=document.createElement('div');
      t.textContent=(pts>0?'+':'')+pts+' PTS'+(reason?' · '+reason:'');
      t.style.cssText='position:fixed;top:64px;right:16px;z-index:900;font-family:Sora,Inter,sans-serif;'
        +'font-weight:800;font-size:13px;letter-spacing:1px;padding:11px 20px;border-radius:100px;'
        +'backdrop-filter:blur(10px);transition:all .5s cubic-bezier(.2,1.3,.3,1);opacity:0;transform:translateY(-14px);'
        +(pts>0?'color:#04120f;background:linear-gradient(90deg,#2fe38f,#37b6ff);box-shadow:0 8px 30px -8px rgba(47,227,143,.7);'
               :'color:#fff;background:linear-gradient(90deg,#ff5d73,#ff9a5d);box-shadow:0 8px 30px -8px rgba(255,93,115,.7);');
      document.body.appendChild(t);
      requestAnimationFrame(()=>{t.style.opacity='1';t.style.transform='none';});
      setTimeout(()=>{t.style.opacity='0';t.style.transform='translateY(-14px)';},2600);
      setTimeout(()=>t.remove(),3200);
    }

    onAuthStateChanged(auth,u=>{
      __mtUser=u;
      if(unsub){unsub();unsub=null;}
      if(u){
        inBtn.style.display='none';chip.style.display='flex';
        document.getElementById('mnavPic').src=u.photoURL||'';
        document.getElementById('mnavNm').textContent=(u.displayName||'You').split(' ')[0];
        unsub=onSnapshot(doc(db,'users',u.uid),s=>{
          document.getElementById('mnavPts').textContent=((s.exists()&&s.data().points)||0)+' PTS';
        },()=>{});
      }else{
        inBtn.style.display='inline-block';chip.style.display='none';
      }
    });
    document.getElementById('mnavOut').onclick=()=>{menu.classList.remove('open');signOut(auth);};
  }catch(e){console.warn('nav auth',e);}
})();
</script>
<button id="perfBtn" aria-pressed="false" title="Toggle performance mode (less animation, zero lag)">
  <span class="pf-ic">⚡</span><span class="pf-sw"></span><span id="perfLbl">Performance</span>
</button>
<script>
/* ══ performance toggle behavior ══ */
(function(){
  var KEY='maatram_perf', btn=document.getElementById('perfBtn'), lbl=document.getElementById('perfLbl');
  function paint(on){
    document.documentElement.classList.toggle('perf',on);
    btn.setAttribute('aria-pressed',String(on));
    lbl.textContent = on ? 'Performance: On' : 'Performance';
  }
  paint(!!window.MAATRAM_PERF);
  btn.addEventListener('click',function(){
    var on=!(localStorage.getItem(KEY)==='1');
    try{localStorage.setItem(KEY,on?'1':'0');}catch(_){}
    /* reload so canvases rebuild at the new detail level — clean + reliable */
    location.reload();
  });
})();
</script>
